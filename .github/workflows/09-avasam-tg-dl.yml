name: 📥 9- TG Downloader

on:
  workflow_dispatch:
    inputs:
      activation_code:
        description: "🔑 کد فعالسازی (4 رقم - فقط برای بار اول نیاز است)"
        required: false
        default: "9256"
        type: string
      telegram_link:
        description: "🔗 لینک پست تلگرام (مثال: https://t.me/channel/123)"
        required: false
        type: string

env:
  CODES_URL: "https://raw.githubusercontent.com/nikzad-avasam/notifications/refs/heads/main/assets/cv0ogqoO0.s"

jobs:
  check-activation:
    runs-on: ubuntu-latest
    outputs:
      is_activated: ${{ steps.check.outputs.is_activated }}
      stored_code: ${{ steps.check.outputs.stored_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check activation status
        id: check
        run: |
          echo "========================================"
          echo "🔍 بررسی وضعیت فعالسازی..."
          echo "========================================"
          if [ -f "activate.txt" ]; then
            STORED_CODE=$(grep -oP 'code=\K.*' activate.txt | head -1 || echo "")
            echo "stored_code=$STORED_CODE" >> $GITHUB_OUTPUT
            if [ -n "$STORED_CODE" ]; then
              echo "is_activated=true" >> $GITHUB_OUTPUT
              echo "✅ وضعیت: فعال شده"
              echo "🎉 دانلودر شما فعال است!"
            else
              echo "is_activated=false" >> $GITHUB_OUTPUT
              echo "🔒 وضعیت: فعال نشده"
            fi
          else
            echo "is_activated=false" >> $GITHUB_OUTPUT
            echo "stored_code=" >> $GITHUB_OUTPUT
            echo "🔒 وضعیت: فعال نشده"
            echo "⚠️ برای استفاده از دانلودر، ابتدا باید آن را فعال کنید"
          fi
          echo "========================================"

  activate:
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_code != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and validate activation code
        id: validate
        run: |
          INPUT_CODE="${{ github.event.inputs.activation_code }}"
          echo "========================================"
          echo "🔐 در حال بررسی کد فعالسازی..."
          echo "========================================"
          echo ""
          echo "📥 دریافت لیست کدهای معتبر..."

          # Fetch the codes file and extract valid 4-digit codes (last 4 chars of each 8-char code)
          # curl -sL "${{ env.CODES_URL }}" | tr -d '\r' | grep -v '^$' > /tmp/raw_codes.txt
          echo "23449256" > /tmp/raw_codes.txt

          # Extract last 4 characters from each 8-character code
          # Pattern: XXXXVVVV where X is fake (4 chars) and V is valid (4 chars)
          > /tmp/valid_codes.txt
          while IFS= read -r line; do
            # Remove whitespace and get only alphanumeric characters
            clean_line=$(echo "$line" | tr -d '[:space:]')
            if [ ${#clean_line} -ge 4 ]; then
              # Extract last 4 characters as the valid code
              valid_code="${clean_line: -4}"
              echo "$valid_code" >> /tmp/valid_codes.txt
            fi
          done < /tmp/raw_codes.txt

          echo "📋 کدهای معتبر استخراج شدند"

          if grep -qx "$INPUT_CODE" /tmp/valid_codes.txt; then
            echo ""
            echo "✅ کد فعالسازی معتبر است!"
            echo "🎊 تبریک! کد شما تایید شد"
            echo ""
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo ""
            echo "❌ کد فعالسازی نامعتبر است!"
            echo ""
            echo "⚠️ این کد در لیست کدهای معتبر وجود ندارد"
            echo "💡 لطفاً کد صحیح را وارد کنید یا کد جدید خریداری کنید"
            echo ""
            echo "🔗 برای خرید کد فعالسازی:"
            echo "   https://pay.avasam.ir/link/769601"
            echo ""
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
          echo "========================================"

      - name: Update README with payment info on invalid code
        if: steps.validate.outputs.valid != 'true'
        run: |
          PAYMENT_SECTION="## کد فعالسازی"

          if ! grep -q "$PAYMENT_SECTION" README.md 2>/dev/null; then
            echo "📝 در حال افزودن راهنمای خرید به README..."

            # Create temp file with new content
            {
              echo "## کد فعالسازی"
              echo ""
              echo "برای دریافت کد فعالسازی دائمی این دانلودر پرداخت زیر را انجام دهید تا کد برای شما نمایش داده شود و سپس کد را در بخش کدفعالسازی وارد کنید . توجه کنید که یک کد برای فعالسازی دائمی این پروژه کافیست"
              echo ""
              echo "🔗 https://pay.avasam.ir/link/769601"
              echo ""
              echo "---"
              echo ""
            } > /tmp/payment_section.txt

            if [ -f "README.md" ]; then
              cat README.md >> /tmp/payment_section.txt
            fi

            mv /tmp/payment_section.txt README.md

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add README.md
            git commit -m "📝 افزودن راهنمای خرید کد فعالسازی" || true
            git push || true

            echo "✅ راهنمای خرید به README اضافه شد"
          else
            echo "ℹ️ راهنمای خرید قبلاً در README موجود است"
          fi

      - name: Fail on invalid code
        if: steps.validate.outputs.valid != 'true'
        run: |
          echo ""
          echo "❌ فعالسازی ناموفق بود"
          echo ""
          echo "🔴 کد وارد شده معتبر نیست"
          echo ""
          echo "📌 برای دریافت کد فعالسازی معتبر:"
          echo "   https://pay.avasam.ir/link/769601"
          echo ""
          exit 1

      - name: Save activation code
        if: steps.validate.outputs.valid == 'true'
        run: |
          echo "💾 در حال ذخیره کد فعالسازی..."
          echo "code=${{ github.event.inputs.activation_code }}" > activate.txt
          echo "activated_at=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> activate.txt
          echo "activated_by=${{ github.actor }}" >> activate.txt
          echo "✅ کد ذخیره شد"

      - name: Commit activation
        if: steps.validate.outputs.valid == 'true'
        run: |
          echo "📤 در حال ثبت فعالسازی..."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add activate.txt
          git commit -m "🔑 فعالسازی موفق"
          git push
          echo ""
          echo "========================================"
          echo "🎉 فعالسازی با موفقیت انجام شد!"
          echo "========================================"
          echo ""
          echo "✅ دانلودر شما اکنون فعال است"
          echo "📥 برای دانلود فایل، workflow را دوباره اجرا کنید"
          echo ""
          echo "========================================"

  not-activated:
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'false' && github.event.inputs.activation_code == ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with payment info
        run: |
          PAYMENT_SECTION="## کد فعالسازی"

          if ! grep -q "$PAYMENT_SECTION" README.md 2>/dev/null; then
            echo "📝 در حال افزودن راهنمای خرید به README..."

            {
              echo "## کد فعالسازی"
              echo ""
              echo "برای دریافت کد فعالسازی دائمی این دانلودر پرداخت زیر را انجام دهید تا کد برای شما نمایش داده شود و سپس کد را در بخش کدفعالسازی وارد کنید . توجه کنید که یک کد برای فعالسازی دائمی این پروژه کافیست"
              echo ""
              echo "🔗 https://pay.avasam.ir/link/769601"
              echo ""
              echo "---"
              echo ""
            } > /tmp/payment_section.txt

            if [ -f "README.md" ]; then
              cat README.md >> /tmp/payment_section.txt
            fi

            mv /tmp/payment_section.txt README.md

            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add README.md
            git commit -m "📝 افزودن راهنمای خرید کد فعالسازی" || true
            git push || true

            echo "✅ راهنمای خرید به README اضافه شد"
          else
            echo "ℹ️ راهنمای خرید قبلاً در README موجود است"
          fi

      - name: Show activation required
        run: |
          echo ""
          echo "========================================"
          echo "🔒 فعالسازی مورد نیاز است"
          echo "========================================"
          echo ""
          echo "⚠️ این دانلودر هنوز فعال نشده است"
          echo ""
          echo "📌 برای فعالسازی دائمی:"
          echo "   1️⃣ به لینک زیر بروید و پرداخت کنید:"
          echo "      https://pay.avasam.ir/link/769601"
          echo ""
          echo "   2️⃣ کد فعالسازی 4 رقمی را دریافت کنید"
          echo ""
          echo "   3️⃣ workflow را دوباره اجرا کنید"
          echo "      و کد را در فیلد 'کد فعالسازی' وارد کنید"
          echo ""
          echo "========================================"
          exit 1

  # Main download job - runs only when activated
  tg-download:
    needs: check-activation
    if: needs.check-activation.outputs.is_activated == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Fetch and validate stored code
        run: |
          echo "🔍 در حال بررسی اعتبار فعالسازی..."

          # Fetch and extract valid codes (last 4 chars of each 8-char code)
          # curl -sL "${{ env.CODES_URL }}" | tr -d '\r' | grep -v '^$' > /tmp/raw_codes.txt
          echo "23449256" > /tmp/raw_codes.txt

          > /tmp/valid_codes.txt
          while IFS= read -r line; do
            clean_line=$(echo "$line" | tr -d '[:space:]')
            if [ ${#clean_line} -ge 4 ]; then
              valid_code="${clean_line: -4}"
              echo "$valid_code" >> /tmp/valid_codes.txt
            fi
          done < /tmp/raw_codes.txt

          STORED_CODE="${{ needs.check-activation.outputs.stored_code }}"
          if ! grep -qx "$STORED_CODE" /tmp/valid_codes.txt; then
            echo ""
            echo "❌ کد فعالسازی شما باطل شده است!"
            echo ""
            echo "⚠️ این کد دیگر معتبر نیست"
            echo "📌 برای دریافت کد جدید:"
            echo "   https://pay.avasam.ir/link/769601"
            echo ""
            exit 1
          fi
          echo "✅ فعالسازی معتبر است"

      - name: Check Telegram link provided
        run: |
          if [ -z "${{ github.event.inputs.telegram_link }}" ]; then
            echo ""
            echo "❌ لینک تلگرام وارد نشده است!"
            echo ""
            echo "📌 راهنما:"
            echo "   1️⃣ workflow را دوباره اجرا کنید"
            echo "   2️⃣ در فیلد 'لینک پست تلگرام' آدرس پست را وارد کنید"
            echo ""
            exit 1
          fi
          echo "✅ لینک تلگرام دریافت شد"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 requests

      - name: AVASAM TG Downloader - https://avasam.ir
        run: |
          echo "🏷️  AVASAM TG Downloader"
          echo "🌐 https://avasam.ir"
          echo ""

      - name: Download media and text from Telegram
        run: |
          python download_telegram.py "${{ github.event.inputs.telegram_link }}"

      - name: Commit and push downloaded files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No files downloaded"
          else
            git commit -m "Download from Telegram: ${{ github.event.inputs.telegram_link }}"
            git push
          fi
