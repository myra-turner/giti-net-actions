name: ℹ️ 28- google-play-downloader

on:
  workflow_dispatch:
    inputs:
      app:
        description: >-
          Google Play URL or Android package name.
          Examples:
            URL:  https://play.google.com/store/apps/details?id=org.telegram.messenger&hl=en
            Package name:  com.google.android.youtube
        required: true
        type: string
      architecture:
        description: Target device architecture
        required: true
        type: choice
        default: "arm64"
        options:
          - arm64
          - armv7
      merge_splits:
        description: Bundle all split APKs into one installable APK
        required: false
        type: boolean
        default: true

jobs:
  actions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Determine package name
        id: pkg
        run: |
          INPUT="${{ inputs.app }}"
          if echo "$INPUT" | grep -qE '^https?://'; then
            PACKAGE=$(echo "$INPUT" | grep -oP '(?<=id=)[^&]*')
            if [ -z "$PACKAGE" ]; then
              echo "Error: Could not extract package name from URL"
              exit 1
            fi
            echo "Extracted: $PACKAGE"
          else
            PACKAGE="$INPUT"
            echo "Using raw: $PACKAGE"
          fi
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq openjdk-17-jre-headless apksigner python3 python3-venv python3-pip curl git zip

      - name: Clone gplay-apk-downloader
        run: |
          git clone https://github.com/alltechdev/gplay-apk-downloader.git
          cd gplay-apk-downloader
          ./setup.sh

      - name: Authenticate with Google Play
        run: |
          cd gplay-apk-downloader
          echo "y" | ./gplay auth
          echo "Authentication completed."

      - name: Download APK(s)
        id: download
        run: |
          cd gplay-apk-downloader
          ARCH="${{ inputs.architecture }}"
          MERGE="${{ inputs.merge_splits }}"
          DOWNLOAD_DIR="$RUNNER_TEMP/apk_downloads"
          mkdir -p "$DOWNLOAD_DIR"

          CMD="./gplay download ${{ steps.pkg.outputs.package }} -a $ARCH -o $DOWNLOAD_DIR"
          if [ "$MERGE" = "true" ]; then
            CMD="$CMD -m"
          fi

          echo "Running: $CMD"
          $CMD

          if [ -z "$(ls -A "$DOWNLOAD_DIR" 2>/dev/null)" ]; then
            echo "Error: No files downloaded"
            exit 1
          fi

          echo "download_dir=$DOWNLOAD_DIR" >> $GITHUB_OUTPUT

      - name: Archive each downloaded file (split ZIP)
        run: |
          DOWNLOAD_DIR="${{ steps.download.outputs.download_dir }}"
          UPLOAD_DIR="${{ github.workspace }}/google-play"   # ← Absolute, robust path
          mkdir -p "$UPLOAD_DIR"

          # Create unique random suffix (5 letters)
          RNDSTR=$(tr -dc 'a-z' < /dev/urandom | head -c5)

          shopt -s nullglob
          file_found=false
          for f in "$DOWNLOAD_DIR"/*; do
            if [ -f "$f" ]; then
              file_found=true
              base=$(basename "$f")
              echo "→ Archiving $base"
              zip -j -s 99m "$UPLOAD_DIR/${base}_${RNDSTR}.zip" "$f"
            fi
          done

          if [ "$file_found" = false ]; then
            echo "Error: No regular files in $DOWNLOAD_DIR"
            exit 1
          fi

      - name: Cleanup temporary download directory
        run: rm -rf "${{ steps.download.outputs.download_dir }}"

      - name: Upload to google-play folder
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git config http.postBuffer 524288000

          FILES=(google-play/*)
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No files to upload."
            exit 0
          fi

          git add google-play/
          git commit -m "Download ${{ steps.pkg.outputs.package }} (${{ inputs.architecture }}) [skip ci]" || echo "Nothing to commit"

          RETRIES=5
          for i in $(seq 1 $RETRIES); do
            echo "Push attempt $i..."
            git pull --rebase --autostash origin "$BRANCH"
            if git push origin "$BRANCH"; then
              echo "Push succeeded."
              break
            else
              if [ $i -lt $RETRIES ]; then
                echo "Push rejected, retrying in 3 seconds..."
                sleep 3
              else
                echo "Push failed after $RETRIES attempts."
                exit 1
              fi
            fi
          done

          echo "All files uploaded to the 'google-play' folder."
